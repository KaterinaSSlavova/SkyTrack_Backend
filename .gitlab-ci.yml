stages:
- build
- test
- sonarqube-check

backend_build:
  stage: build
  script:
    - cd backend
    - chmod +x gradlew
    - ./gradlew assemble --no-daemon

backend_test:
  stage: test
  script:
    - cd backend
    - chmod +x gradlew
    - ./gradlew test assemble --no-daemon

backend_sonarqube-check:
  stage: sonarqube-check
  script:
    - cd backend
    - echo "<3"

frontend_build:
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build