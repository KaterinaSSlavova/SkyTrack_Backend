stages:
  - build
  - test
  - sonarqube-check
  - deploy

build:
  stage: build
  script:
    - ./gradlew assemble --no-daemon

test:
  stage: test
  script:
    - ./gradlew test --no-daemon

sonarqube-check:
  stage: sonarqube-check
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
    SONAR_HOST_URL: "http://localhost:9000"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - ./gradlew build jacocoTestReport sonar --no-daemon -Dsonar.qualitygate.wait=true
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

deploy:
  stage: deploy
  script:
    - docker build -t skytrack-backend:latest .
    - docker stop skytrack-backend || true
    - docker rm skytrack-backend || true
    - docker run -d --name skytrack-backend --restart unless-stopped --env-file /opt/skytrack/.env -p 8080:8080 skytrack-backend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'