stages:
  - test
  - sonarqube-check
  - docker
  - deploy

test:
  stage: test
  script:
    - ./gradlew test assemble --no-daemon

sonarqube-check:
  stage: sonarqube-check
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - ./gradlew build jacocoTestReport sonar --no-daemon -Dsonar.qualitygate.wait=true
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

docker-build-push:
  stage: docker
  script:
    - docker login git.fhict.nl -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - docker build -t git.fhict.nl/i547761/skytrack:latest .
    - docker push git.fhict.nl/i547761/skytrack:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

deploy:
  stage: deploy
  script:
    - docker login git.fhict.nl -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - cd /opt/skytrack
    - docker compose pull backend
    - docker compose up -d backend
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'